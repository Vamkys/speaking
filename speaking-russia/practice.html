<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice Mode - Полный вариант</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --header-bg: #1a252f;
            --bg-color: #f0f2f5;
            --accent: #3498db;
            --green: #2ecc71;
            --red: #e74c3c;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding-top: 80px;
            color: #2c3e50;
        }

        .page-header {
            background-color: var(--header-bg);
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            z-index: 1000;
        }

        .gen-btn {
            background-color: var(--green);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 5px;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }
        .gen-btn:hover { background-color: #27ae60; transform: scale(1.05); }

        .timer-display {
            background: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 800;
            font-size: 1.4rem;
            min-width: 80px;
            text-align: center;
        }

        .container { max-width: 900px; margin: 0 auto 50px; padding: 0 20px; }

        .task-card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: none;
        }

        .show { display: block !important; }

        h2 { border-left: 5px solid var(--accent); padding-left: 15px; margin-top: 0; }
        .instruction { font-weight: 600; color: #7f8c8d; margin-bottom: 15px; }
        
        .content-box { line-height: 1.7; font-size: 1.05rem; }
        
        img { max-width: 100%; border-radius: 8px; margin: 15px 0; border: 1px solid #ddd; }
        
        .dual-img { display: flex; gap: 15px; margin: 15px 0; }
        .dual-img img { width: 50%; height: 250px; object-fit: cover; }

        .controls { display: flex; gap: 10px; margin-top: 15px; }
        .btn-s { padding: 8px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; color: white; }
        .btn-blue { background: var(--accent); }
        .btn-grey { background: #95a5a6; }

        .answer-area {
            display: none;
            margin-top: 15px;
            padding: 15px;
            background: #f9f9f9;
            border-left: 4px solid var(--green);
            font-size: 0.95rem;
        }

        .welcome { text-align: center; padding: 80px 0; }
    </style>
</head>
<body>

    <header class="page-header">
        <div style="display: flex; gap: 15px; align-items: center;">
            <a href="index.html" style="color: white; text-decoration: none; font-weight: 600;">← МЕНЮ</a>
            <button class="gen-btn" onclick="generateVariant()">Сгенерировать вариант</button>
        </div>
        <div class="timer-display" id="timer">00:00</div>
    </header>

    <div class="container">
        
        <div id="welcome" class="welcome">
            <h1>Экзаменационный тренажер</h1>
            <p>Нажмите кнопку вверху, чтобы собрать случайный вариант из 7 тем.</p>
        </div>

        <div id="t1" class="task-card">
            <h2>Task 1. Reading aloud</h2>
            <div class="instruction">Read the text aloud (1.5 min preparation).</div>
            <div id="t1-text" class="content-box"></div>
            <div class="controls">
                <button class="btn-s btn-blue" onclick="startTimer(90)">1:30</button>
            </div>
        </div>

        <div id="t2" class="task-card">
            <h2>Task 2. Direct Questions</h2>
            <div class="content-box">
                <img id="t2-img" src="" alt="Advertisement">
                <p id="t2-instr"></p>
                <ul id="t2-points"></ul>
            </div>
            <div class="controls">
                <button class="btn-s btn-blue" onclick="startTimer(90)">1:30</button>
                <button class="btn-s btn-grey" onclick="toggleAns('t2-ans')">Ответы</button>
            </div>
            <div id="t2-ans" class="answer-area"></div>
        </div>

        <div id="t3" class="task-card">
            <h2>Task 3. Interview</h2>
            <div class="content-box">
                <p>Answer 5 questions based on the topic.</p>
                <audio id="t3-audio" controls src=""></audio>
            </div>
            <div class="controls">
                <button class="btn-s btn-grey" onclick="toggleAns('t3-ans')">Скрипт и Ответы</button>
            </div>
            <div id="t3-ans" class="answer-area"></div>
        </div>

        <div id="t4" class="task-card">
            <h2>Task 4. Speaking Project</h2>
            <div class="instruction" id="t4-theme"></div>
            <div class="dual-img">
                <img id="t4-img1" src="" alt="Photo 1">
                <img id="t4-img2" src="" alt="Photo 2">
            </div>
            <div id="t4-task" class="content-box"></div>
            <div class="controls">
                <button class="btn-s btn-blue" onclick="startTimer(150)">2:30</button>
            </div>
        </div>

    </div>

    <script>
        const topics = {
            1: {
                title: "Sightseeing in Russia",
                t1: "Russia is famous for its historical routes, and the Golden Ring is perhaps the most celebrated one. This ring of ancient cities north-east of Moscow offers a unique glimpse into the country's medieval past. Each city, like Suzdal or Vladimir, features stunning white-stone churches and golden-domed cathedrals that date back centuries. These locations are not just open-air museums; they are living parts of Russian history where traditional crafts are still practiced. Tourists can enjoy the quiet atmosphere of the countryside while admiring the intricate architecture. Visiting the Golden Ring is a perfect way to escape the busy life of the capital and learn about the roots of Russian culture. Today, these cities are protected as World Heritage sites, ensuring that their beauty and historical significance will be preserved for future generations of travelers from all over the world.",
                t2: ["duration of the tour", "transport", "group size", "discounts for students"],
                t2a: "1. How long does the tour last? / 2. What kind of transport is provided? / 3. What is the group size? / 4. Are there any discounts for students?",
                t3: "1. Region? (Oryol, famous for writer Turgenev) <br> 2. Popular places? (Moscow, SPb, Baikal) <br> 3. Historical landmarks? (Local parks/museums) <br> 4. Abroad vs Russia? (Different cultures, climate) <br> 5. Advice? (Weather, basic phrases)",
                t4: "The Red Square vs Lake Baikal."
            },
            2: {
                title: "Famous People of Russia",
                t1: "Alexander Pushkin is widely considered the greatest Russian poet and the founder of modern Russian literature. Born in 1799, he revolutionized the Russian language by mixing the formal grammar of the time with the natural speech of the people. His works, including 'Eugene Onegin' and numerous fairy tales, are studied by every schoolchild in the country. Pushkin’s influence is so great that his birthday is now celebrated as Russian Language Day. He had a remarkable ability to express deep human emotions through simple yet beautiful verses. Although his life was tragically short, he left behind a massive literary heritage that continues to inspire writers and artists worldwide. To Russians, Pushkin is more than just a writer; he is a symbol of national pride and cultural identity.",
                t2: ["location of the exhibition", "opening hours", "entrance fee", "audio guide availability"],
                t2a: "1. Where is the exhibition located? / 2. Opening hours? / 3. Entrance fee? / 4. Is an audio guide available?",
                t3: "1. Most famous person? (Turgenev) <br> 2. Scientist? (Mendeleev) <br> 3. Athletes? (Figure skaters) <br> 4. Easy to be famous? (Stressful, social media) <br> 5. Your field? (Linguistics/Education)",
                t4: "Pushkin (Writer) vs Gagarin (Explorer)."
            },
            3: {
                title: "Russian Holidays and Traditions",
                t1: "Maslenitsa is one of the oldest and most cheerful Russian traditions, marking the end of winter and the arrival of spring. This holiday lasts for a whole week and is filled with various activities, such as sledding and outdoor festivals. The most important symbol of Maslenitsa is the pancake, or 'blin,' which represents the sun because of its round shape and golden color. People cook and eat large quantities of pancakes with different fillings, inviting friends and relatives to join the feast. The week ends with the burning of a straw figure, which symbolizes the departure of the cold season. It is a time for forgiveness and joy before the beginning of the Great Lent. Even today, Maslenitsa remains a popular celebration that brings families and communities together across the country.",
                t2: ["special menu", "table reservation", "entertainment program", "price for one person"],
                t2a: "1. Do you have a special menu? / 2. Can I make a table reservation? / 3. What is the entertainment program? / 4. What is the price for one person?",
                t3: "1. Important holiday? (New Year) <br> 2. Maslenitsa celebrate? (Pancakes, bonfire) <br> 3. Traditional food? (Olivier, Shuba, pies) <br> 4. Why roots? (Belonging, ancestors) <br> 5. New holiday? (Psychology Day)",
                t4: "Maslenitsa (Outdoor) vs Family feast (Home)."
            },
            4: {
                title: "Nature and Environmental Issues",
                t1: "Russia possesses the largest forest reserves in the world, often referred to as the 'lungs of Europe.' These vast territories of taiga play a crucial role in regulating the global climate by absorbing carbon dioxide. However, these forests face several environmental threats, including illegal logging and forest fires during the hot summer months. Protecting this natural wealth has become a top priority for the government and various environmental organizations. New laws have been introduced to ensure sustainable forest management and to restore areas damaged by fires. Public awareness campaigns also encourage citizens to behave responsibly when spending time in nature. Preserving the forests is not only important for the economy but also for protecting the habitats of endangered animals like the Siberian tiger.",
                t2: ["meeting point", "equipment provided", "duration of the event", "age restrictions"],
                t2a: "1. Where is the meeting point? / 2. Is equipment provided? / 3. How long does the event last? / 4. Any age restrictions?",
                t3: "1. Climate? (Temperate continental) <br> 2. Town problems? (Pollution, litter) <br> 3. Your family? (Save water/electricity) <br> 4. Ecology in schools? (Yes, responsibility) <br> 5. Friends eco-style? (Sorting trash)",
                t4: "Beautiful landscape vs Pollution/Litter."
            },
            5: {
                title: "Life in the City and Countryside",
                t1: "Living in a large Russian city like Moscow or Novosibirsk offers many advantages but also presents certain challenges. On the one hand, urban residents have access to the best educational institutions, modern healthcare, and a wide variety of cultural events. The public transport system, including the famous metro, allows people to move quickly between different districts. On the other hand, the fast pace of life and constant noise can be quite stressful. Many city dwellers suffer from air pollution and a lack of green spaces near their homes. Despite these drawbacks, young people continue to move to big cities in search of career opportunities and a vibrant social life. Urban planning is now focusing on creating more parks and pedestrian zones to make city life more comfortable for everyone.",
                t2: ["distance from the city", "number of rooms", "local facilities", "monthly rent"],
                t2a: "1. Distance from the city? / 2. Number of rooms? / 3. Local facilities? / 4. Monthly rent?",
                t3: "1. Prefer where? (Big city) <br> 2. Metropolis disadvantages? (Traffic, noise) <br> 3. Young move why? (Education, jobs) <br> 4. Benefits countryside? (Fresh air, no gadgets) <br> 5. Changes? (Digital services, transport)",
                t4: "Moscow City (Skyscrapers) vs Village house."
            },
            6: {
                title: "Science and Space Exploration",
                t1: "The history of space exploration changed forever on April 12, 1961, when Yuri Gagarin became the first human to travel into outer space. His spacecraft, Vostok 1, completed a single orbit around the Earth, lasting only 108 minutes. This historic mission proved that humans could survive in weightlessness and paved the way for future lunar missions and space stations. Gagarin’s courage and his famous smile made him an international hero and a symbol of scientific progress. Since then, Russia has continued to play a leading role in space research, developing reliable rockets and maintaining the International Space Station. Every year, Cosmonautics Day is celebrated to honor the scientists and pilots who made space travel possible. The legacy of these pioneers continues to inspire new generations to look at the stars and dream of new discoveries.",
                t2: ["online booking", "ticket price", "film duration", "photography permission"],
                t2a: "1. Online booking available? / 2. Ticket price? / 3. Film duration? / 4. Photography allowed?",
                t3: "1. First man? (Gagarin, 1961) <br> 2. Space news? (Yes, mystery) <br> 3. Discovery? (Radio, Popov) <br> 4. Gov money why? (Technologies, prestige) <br> 5. Tourist? (Dangerous but incredible)",
                t4: "Laboratory (Science) vs Rocket launch (Space)."
            },
            7: {
                title: "Schooling in Russia",
                t1: "The school system in Russia is designed to provide students with a broad and solid foundation in various academic disciplines. Primary education begins at the age of six or seven and lasts for four years, followed by middle and senior school. The curriculum includes a wide range of subjects, from mathematics and literature to foreign languages and computer science. One of the unique features of Russian schools is the emphasis on classical literature, which helps students develop critical thinking and cultural awareness. At the end of their studies, students must take the Unified State Exam to enter universities. Recent reforms have introduced digital technologies into classrooms, allowing for more interactive and personalized learning. Despite these changes, the traditional role of the teacher as a mentor remains highly respected in Russian society.",
                t2: ["placement test", "number of students in a group", "course duration", "evening classes"],
                t2a: "1. Is a placement test required? / 2. How many students in a group? / 3. Course duration? / 4. Are there evening classes?",
                t3: "1. Favourite subject? (English/Social) <br> 2. Breaks? (Chat, phone, snack) <br> 3. Real life? (Discipline, knowledge) <br> 4. EGE opinion? (Stressful, fair) <br> 5. After graduate? (University, degree)",
                t4: "Traditional classroom vs Online learning."
            }
        };

        function generateVariant() {
            document.getElementById('welcome').style.display = 'none';
            document.querySelectorAll('.task-card').forEach(c => c.classList.add('show'));
            document.querySelectorAll('.answer-area').forEach(a => a.classList.remove('show'));

            // Независимый рандом для каждого задания
            const r1 = Math.floor(Math.random() * 7) + 1;
            const r2 = Math.floor(Math.random() * 7) + 1;
            const r3 = Math.floor(Math.random() * 7) + 1;
            const r4 = Math.floor(Math.random() * 7) + 1;

            // Заполнение Задания 1
            document.getElementById('t1-text').innerText = topics[r1].t1;

            // Заполнение Задания 2
            document.getElementById('t2-img').src = `images/ts2/${r2}.jpg`;
            document.getElementById('t2-instr').innerText = `You are considering... (${topics[r2].title}). Ask 4 questions:`;
            const t2List = document.getElementById('t2-points');
            t2List.innerHTML = "";
            topics[r2].t2.forEach(p => t2List.innerHTML += `<li>${p}</li>`);
            document.getElementById('t2-ans').innerText = topics[r2].t2a;

            // Заполнение Задания 3
            document.getElementById('t3-audio').src = `images/ts3/${r3}.mp3`;
            document.getElementById('t3-ans').innerHTML = topics[r3].t3;

            // Заполнение Задания 4 (Логика имен файлов: Тема 1 -> 2.jpg и 3.jpg)
            const imgStart = r4 * 2; 
            document.getElementById('t4-theme').innerText = "Project Theme: " + topics[r4].title;
            document.getElementById('t4-img1').src = `images/ts4/${imgStart}.jpg`;
            document.getElementById('t4-img2').src = `images/ts4/${imgStart + 1}.jpg`;
            document.getElementById('t4-task').innerHTML = `<p><b>Describe:</b> ${topics[r4].t4}</p>
                <ul><li>Give brief description + differences</li><li>Advantages/Disadvantages (1-2)</li><li>Your opinion/preference</li></ul>`;

            window.scrollTo(0, 0);
        }

        let timerInt;
        function startTimer(sec) {
            clearInterval(timerInt);
            let time = sec;
            const disp = document.getElementById('timer');
            timerInt = setInterval(() => {
                let m = Math.floor(time / 60);
                let s = time % 60;
                disp.innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
                if (time <= 0) { clearInterval(timerInt); alert("Время вышло!"); }
                time--;
            }, 1000);
        }

        function toggleAns(id) { document.getElementById(id).classList.toggle('show'); }
    </script>
</body>
</html>
